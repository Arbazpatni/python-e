name: N-Account Manager (Renew & Deploy)

on:
  schedule:
    - cron: '0 0 1,15 * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: echo "matrix=${{ vars.ACCOUNTS_LIST }}" >> $GITHUB_OUTPUT

  manage_accounts:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # THIS STEP WAS INDENTED WRONG - FIXED BELOW
      - name: Hardcoded Secret Test
        env:
          TEST_USER: ${{ secrets.USER_1 }}
        run: |
          if [ -n "$TEST_USER" ]; then
            echo "✅ I can see USER_1 directly!"
          else
            echo "❌ I still cannot see USER_1 even when hardcoded."
          fi

      # --- TASK 1: AUTO-RENEW ---
      - name: Auto-Renew Account ${{ matrix.account_index }}
        env:
          PA_USERNAME: ${{ secrets[format('USER_{0}', matrix.account_index)] }}
          PA_PASSWORD: ${{ secrets[format('PASS_{0}', matrix.account_index)] }}
        run: |
          pip install requests beautifulsoup4
          python renew.py

      - name: Sync, Kill Console, and Reload
        env:
          USERNAME: ${{ secrets[format('USER_{0}', matrix.account_index)] }}
          TOKEN: ${{ secrets[format('TOKEN_{0}', matrix.account_index)] }}
        run: |
          # 1. Get Webapp Info
          RESPONSE=$(curl -s -H "Authorization: Token $TOKEN" "https://www.pythonanywhere.com/api/v0/user/$USERNAME/webapps/")
          DOMAIN=$(echo $RESPONSE | jq -r '.[0].domain_name')
          SOURCE_DIR=$(echo $RESPONSE | jq -r '.[0].source_directory')

          # 2. PRE-CLEANUP: Kill any lingering consoles to free up the 2 slots
          echo "🧹 Clearing existing consoles..."
          CURRENT_CONSOLES=$(curl -s -H "Authorization: Token $TOKEN" "https://www.pythonanywhere.com/api/v0/user/$USERNAME/consoles/")
          echo $CURRENT_CONSOLES | jq -r '.[].id' | xargs -I {} curl -s -X DELETE "https://www.pythonanywhere.com/api/v0/user/$USERNAME/consoles/{}/" -H "Authorization: Token $TOKEN"

          # 3. START NEW CONSOLE: Run the git pull
          echo "📥 Starting Git Pull..."
          CONSOLE_RESPONSE=$(curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/$USERNAME/consoles/" \
            -H "Authorization: Token $TOKEN" \
            --data-urlencode "executable=bin/bash" \
            --data-urlencode "arguments=-c 'cd $SOURCE_DIR && git pull'")
          
          # Capture the ID correctly from the response
          CONSOLE_ID=$(echo $CONSOLE_RESPONSE | jq -r 'if type == "array" then .[0].id else .id end')
          echo "✅ Console started with ID: $CONSOLE_ID"

          # 4. WAIT: Give the pull time to finish
          echo "⏳ Syncing files (20s)..."
          sleep 20

          # 5. POST-CLEANUP: Kill the console we just used
          if [ "$CONSOLE_ID" != "null" ] && [ -n "$CONSOLE_ID" ]; then
            echo "🗑️ Closing console $CONSOLE_ID..."
            curl -s -X DELETE "https://www.pythonanywhere.com/api/v0/user/$USERNAME/consoles/$CONSOLE_ID/" \
              -H "Authorization: Token $TOKEN"
          fi

          # 6. RELOAD: Restart the web server
          echo "🚀 Restarting Web Server..."
          curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/$USERNAME/webapps/$DOMAIN/reload/" \
            -H "Authorization: Token $TOKEN"

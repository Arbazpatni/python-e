name: N-Account Manager (Renew & Deploy)

on:
  schedule:
    - cron: '0 0 1,15 * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: echo "matrix=${{ vars.ACCOUNTS_LIST }}" >> $GITHUB_OUTPUT

  manage_accounts:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # THIS STEP WAS INDENTED WRONG - FIXED BELOW
      - name: Hardcoded Secret Test
        env:
          TEST_USER: ${{ secrets.USER_1 }}
        run: |
          if [ -n "$TEST_USER" ]; then
            echo "✅ I can see USER_1 directly!"
          else
            echo "❌ I still cannot see USER_1 even when hardcoded."
          fi

      # --- TASK 1: AUTO-RENEW ---
      - name: Auto-Renew Account ${{ matrix.account_index }}
        env:
          PA_USERNAME: ${{ secrets[format('USER_{0}', matrix.account_index)] }}
          PA_PASSWORD: ${{ secrets[format('PASS_{0}', matrix.account_index)] }}
        run: |
          pip install requests beautifulsoup4
          python renew.py

      - name: Sync and Reload with Debug
        env:
          USERNAME: ${{ secrets[format('USER_{0}', matrix.account_index)] }}
          TOKEN: ${{ secrets[format('TOKEN_{0}', matrix.account_index)] }}
        run: |
          # 1. Setup
          RESPONSE=$(curl -s -H "Authorization: Token $TOKEN" "https://www.pythonanywhere.com/api/v0/user/$USERNAME/webapps/")
          DOMAIN=$(echo $RESPONSE | jq -r '.[0].domain_name')
          SOURCE_DIR=$(echo $RESPONSE | jq -r '.[0].source_directory')

          # 2. Run the Sync and save output to a file
          echo "📥 Forcing Git Sync..."
          # We use > sync.log to capture what happens
          curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/$USERNAME/consoles/" \
            -H "Authorization: Token $TOKEN" \
            --data-urlencode "executable=bin/bash" \
            --data-urlencode "arguments=-c 'cd $SOURCE_DIR && git fetch origin main && git reset --hard origin/main > sync.log 2>&1'"
          
          echo "⏳ Waiting 15s..."
          sleep 15

          # 3. READ THE LOG (This will show you the real error)
          echo "📝 GIT OUTPUT FROM SERVER:"
          curl -s -H "Authorization: Token $TOKEN" "https://www.pythonanywhere.com/api/v0/user/$USERNAME/files/path/home/$USERNAME/python-e/sync.log"
          
          # 4. Reload
          echo "🚀 Reloading..."
          curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/$USERNAME/webapps/$DOMAIN/reload/" \
            -H "Authorization: Token $TOKEN"

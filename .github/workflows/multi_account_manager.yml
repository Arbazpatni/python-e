name: N-Account Manager (Renew & Deploy)

on:
  schedule:
    - cron: '0 0 1,15 * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: echo "matrix=${{ vars.ACCOUNTS_LIST }}" >> $GITHUB_OUTPUT

  manage_accounts:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # THIS STEP WAS INDENTED WRONG - FIXED BELOW
      - name: Hardcoded Secret Test
        env:
          TEST_USER: ${{ secrets.USER_1 }}
        run: |
          if [ -n "$TEST_USER" ]; then
            echo "✅ I can see USER_1 directly!"
          else
            echo "❌ I still cannot see USER_1 even when hardcoded."
          fi

      # --- TASK 1: AUTO-RENEW ---
      - name: Auto-Renew Account ${{ matrix.account_index }}
        env:
          PA_USERNAME: ${{ secrets[format('USER_{0}', matrix.account_index)] }}
          PA_PASSWORD: ${{ secrets[format('PASS_{0}', matrix.account_index)] }}
        run: |
          pip install requests beautifulsoup4
          python renew.py

      # --- TASK 2: AUTO-DEPLOY ---
      - name: Reload Web App for Account ${{ matrix.account_index }}
        env:
          USERNAME: ${{ secrets[format('USER_{0}', matrix.account_index)] }}
          TOKEN: ${{ secrets[format('TOKEN_{0}', matrix.account_index)] }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "❌ API Token for index ${{ matrix.account_index }} is missing. Skipping."
            exit 0
          fi

          echo "Fetching Web App list for $USERNAME..."
          # 1. Get the actual domain name from the API
          RESPONSE=$(curl -s -H "Authorization: Token $TOKEN" "https://www.pythonanywhere.com/api/v0/user/$USERNAME/webapps/")

          # 2. Extract the domain (handling potential multiple apps)
          DOMAIN=$(echo $RESPONSE | jq -r '.[0].domain_name')

          if [ "$DOMAIN" == "null" ] || [ -z "$DOMAIN" ]; then
            echo "❌ No Web App found for $USERNAME. Response: $RESPONSE"
            exit 1
          fi

          echo "🚀 Reloading $DOMAIN..."
          RELOAD_CONFIRM=$(curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/$USERNAME/webapps/$DOMAIN/reload/" \
            -H "Authorization: Token $TOKEN")

          echo "Server Response: $RELOAD_CONFIRM"

name: N-Account Manager (Renew & Deploy)

on:
  schedule:
    - cron: '0 0 1,15 * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: echo "matrix=${{ vars.ACCOUNTS_LIST }}" >> $GITHUB_OUTPUT

  manage_accounts:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # THIS STEP WAS INDENTED WRONG - FIXED BELOW
      - name: Hardcoded Secret Test
        env:
          TEST_USER: ${{ secrets.USER_1 }}
        run: |
          if [ -n "$TEST_USER" ]; then
            echo "✅ I can see USER_1 directly!"
          else
            echo "❌ I still cannot see USER_1 even when hardcoded."
          fi

      # --- TASK 1: AUTO-RENEW ---
      - name: Auto-Renew Account ${{ matrix.account_index }}
        env:
          PA_USERNAME: ${{ secrets[format('USER_{0}', matrix.account_index)] }}
          PA_PASSWORD: ${{ secrets[format('PASS_{0}', matrix.account_index)] }}
        run: |
          pip install requests beautifulsoup4
          python renew.py

          # --- TASK 2: PULL & RELOAD ---
      - name: Pull Code and Reload Account ${{ matrix.account_index }}
        env:
          USERNAME: ${{ secrets[format('USER_{0}', matrix.account_index)] }}
          TOKEN: ${{ secrets[format('TOKEN_{0}', matrix.account_index)] }}
        run: |
          # 1. Fetch the domain and source directory
          RESPONSE=$(curl -s -H "Authorization: Token $TOKEN" "https://www.pythonanywhere.com/api/v0/user/$USERNAME/webapps/")
          DOMAIN=$(echo $RESPONSE | jq -r '.[0].domain_name')
          SOURCE_DIR=$(echo $RESPONSE | jq -r '.[0].source_directory')

          echo "📂 Source Directory: $SOURCE_DIR"

          # 2. Trigger the Git Pull
          # FIXED: Added the missing closing quote and used --data-urlencode for safety
          echo "📥 Sending Git Pull command to PythonAnywhere..."
          CONSOLE_RESPONSE=$(curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/$USERNAME/consoles/" \
            -H "Authorization: Token $TOKEN" \
            -d "executable=bin/bash" \
            -d "arguments=-c 'cd $SOURCE_DIR && git pull && echo nice > nice'")
          
          CONSOLE_ID=$(echo $CONSOLE_RESPONSE | jq -r '.id')
          echo "✅ Console started with ID: $CONSOLE_ID"

          echo "⏳ Waiting 20 seconds for Git to sync files..."
          sleep 20

          # 4. KILL the console to free up the slot
          if [ "$CONSOLE_ID" != "null" ]; then
            echo "🗑️ Closing console $CONSOLE_ID to free up slots..."
            curl -s -X DELETE "https://www.pythonanywhere.com/api/v0/user/$USERNAME/consoles/$CONSOLE_ID/" \
              -H "Authorization: Token $TOKEN"
          fi

          # 4. Reload the web app
          echo "🚀 Reloading $DOMAIN..."
          curl -s -X POST "https://www.pythonanywhere.com/api/v0/user/$USERNAME/webapps/$DOMAIN/reload/" \
            -H "Authorization: Token $TOKEN"

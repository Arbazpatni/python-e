name: N-Account Manager (Renew & Deploy)

on:
  schedule:
    - cron: '0 0 1,15 * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # STEP 1: Parse the variable to create the dynamic list
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: echo "matrix=${{ vars.ACCOUNTS_LIST }}" >> $GITHUB_OUTPUT

  # STEP 2: Run for every account in that list
  manage_accounts:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

          # --- TASK 1: AUTO-RENEW (Manual Script Execution) ---
      - name: Download and Run Renewal Script for Account ${{ matrix.account_index }}
        env:
          # Inject the secrets into Environment Variables for the Python script
          PA_USERNAME: ${{ secrets[format('USER_{0}', matrix.account_index)] }}
          PA_PASSWORD: ${{ secrets[format('PASS_{0}', matrix.account_index)] }}
        run: |
          # 1. Download the renewal script from the source
          curl -s -O https://raw.githubusercontent.com/tanishqmudaliar/PythonAnywhere-Auto-Renew/main/renew_python_anywhere.py
          curl -s -O https://raw.githubusercontent.com/tanishqmudaliar/PythonAnywhere-Auto-Renew/main/requirements.txt
          
          # 2. Install the few libraries it needs (requests, bs4)
          pip install -r requirements.txt
          
          # 3. Run the script
          python renew_python_anywhere.py

      # --- TASK 2: AUTO-DEPLOY ---
      - name: Reload Web App for Account ${{ matrix.account_index }}
        env:
          USERNAME: ${{ secrets[format('USER_{0}', matrix.account_index)] }}
          TOKEN: ${{ secrets[format('TOKEN_{0}', matrix.account_index)] }}
        run: |
          if [ -z "$USERNAME" ] || [ -z "$TOKEN" ]; then
            echo "Secrets for index ${{ matrix.account_index }} not found. Skipping."
            exit 0
          fi
          DOMAIN="${USERNAME}.pythonanywhere.com"
          echo "Reloading $DOMAIN..."
          curl -s -X POST "https://www.pythonanywhere.com/api/v1/user/$USERNAME/webapps/$DOMAIN/reload/" \
            -H "Authorization: Token $TOKEN"
